<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Anime — OtakuPH</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/browse.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="page-browse">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-logo">
      <a href="index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;">
        <span class="logo-icon">⛩</span>
        <span class="logo-text">Otaku<span class="accent">PH</span></span>
      </a>
    </div>
    <div class="nav-links">
      <a href="browse.html" class="nav-link active">Browse Anime</a>
      <a href="community.html" class="nav-link">Community</a>
    </div>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn btn-ghost">Log In</a>
      <a href="register.html" class="btn btn-primary">Join Free</a>
    </div>
    <div class="nav-user" id="navUser" style="display:none;">
      <a href="upload.html" class="btn btn-ghost">⬆ Upload</a>
      <div class="avatar-menu">
        <div class="avatar" id="userAvatar">?</div>
        <div class="dropdown" id="userDropdown">
          <span class="dropdown-name" id="dropdownName">User</span>
          <a href="profile.html" class="dropdown-item">My Profile</a>
          <hr class="dropdown-divider"/>
          <button class="dropdown-item dropdown-logout" id="logoutBtn">Log Out</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- BROWSE HEADER -->
  <div class="browse-header">
    <h1 class="browse-title">🎌 Browse Anime</h1>
    <p class="browse-sub">Discover thousands of anime titles — from classics to the newest simulcasts</p>
  </div>

  <!-- SEARCH & FILTERS -->
  <div class="browse-controls">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Search anime title, genre, character..."/>
      <button class="btn btn-primary" id="searchBtn">Search</button>
    </div>
    <div class="filter-bar">
      <div class="filter-group">
        <label>Genre</label>
        <select id="filterGenre" class="filter-select">
          <option value="">All Genres</option>
          <option>Action</option>
          <option>Romance</option>
          <option>Comedy</option>
          <option>Horror</option>
          <option>Fantasy</option>
          <option>Sci-Fi</option>
          <option>Slice of Life</option>
          <option>Sports</option>
          <option>Isekai</option>
          <option>Mecha</option>
          <option>Mystery</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filterStatus" class="filter-select">
          <option value="">All</option>
          <option>Ongoing</option>
          <option>Completed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="filterSort" class="filter-select">
          <option value="popular">Most Popular</option>
          <option value="rating">Highest Rated</option>
          <option value="newest">Newest</option>
          <option value="az">A–Z</option>
        </select>
      </div>
      <button class="btn btn-ghost" id="clearFilters">✕ Clear</button>
    </div>
  </div>

  <!-- RESULTS COUNT -->
  <div class="results-info" id="resultsInfo">Showing all anime</div>

  <!-- ANIME GRID -->
  <div class="anime-grid-browse" id="browseGrid">
    <!-- Populated by JS -->
  </div>

  <!-- LOAD MORE -->
  <div class="load-more-wrap">
    <button class="btn btn-outline" id="loadMoreBtn">Load More</button>
  </div>

  <!-- WATCH MODAL -->
  <div class="modal-overlay" id="watchModal" style="display:none;">
    <div class="modal-box">
      <button class="modal-close" id="closeModal">✕</button>
      <div class="modal-content" id="modalContent">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <footer class="footer footer-slim">
    <p>© 2025 OtakuPH · Made with ❤️ for Filipino Otaku</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
