<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — OtakuPH</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="auth-panel-left">
      <a href="index.html" class="auth-logo">⛩ Otaku<span class="accent">PH</span></a>
      <div class="auth-art">
        <div class="art-circle c1"></div>
        <div class="art-circle c2"></div>
        <div class="art-kanji">
          <span>ようこそ</span>
          <span>戻って</span>
          <span>来た</span>
        </div>
        <p class="auth-tagline">Welcome back, Otaku-san! Your community missed you.</p>
      </div>
    </div>

    <div class="auth-panel-right">
      <div class="auth-card">
        <h2 class="auth-title">Welcome Back!</h2>
        <p class="auth-sub">New here? <a href="register.html" class="link-accent">Create a free account</a></p>

        <div class="alert" id="loginAlert" style="display:none;"></div>

        <div class="form-group">
          <label class="form-label">Username or Email</label>
          <input type="text" id="loginIdentifier" class="form-input" placeholder="Username or email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-eye">
            <input type="password" id="loginPassword" class="form-input" placeholder="Your password"/>
            <button type="button" class="eye-btn" data-target="loginPassword">👁</button>
          </div>
        </div>
        <div class="form-row">
          <label class="form-check">
            <input type="checkbox" id="rememberMe"/> Remember me
          </label>
          <a href="#" class="link-accent small">Forgot password?</a>
        </div>
        <button class="btn btn-primary btn-full" id="loginBtn">Log In</button>
        <div class="auth-divider"><span>or</span></div>
        <a href="index.html" class="btn btn-ghost btn-full">← Back to Home</a>

        <!-- Demo hint -->
        <div class="demo-hint">
          <b>Demo:</b> Register a new account or use any previously registered username/email.
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
